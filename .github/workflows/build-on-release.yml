name: Build Tauri App on Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "23"

      - name: Install llvm via Chocolatey
        run: choco install llvm --yes

      - name: Install opencv via Chocolatey
        run: choco install opencv --yes

      - name: Configure environment
        run: |
          setx OPENCV_INCLUDE_PATHS "C:\tools\opencv\build\include"
          setx OPENCV_LINK_LIBS "opencv_world4100.lib"
          setx OPENCV_LINK_PATHS "C:\tools\opencv\build\x64\vc16\lib"
          setx PATH "%PATH%;C:\tools\opencv\build\x64\vc16\bin"

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run tauri build

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: TauriApp
          path: ./dist/x86_64-pc-windows-msvc.exe
